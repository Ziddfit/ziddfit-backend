<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Login - Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .oauth-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .oauth-btn:active {
            transform: translateY(0);
        }

        .oauth-btn img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
        }

        .email-login {
            margin-top: 20px;
        }

        .email-login input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
            transition: border-color 0.3s;
        }

        .email-login input:focus {
            outline: none;
            border-color: #667eea;
        }

        .email-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .email-btn:hover {
            background: #5568d3;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .user-info {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .user-info h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .user-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .logout-btn {
            margin-top: 15px;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .setup-notice {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .setup-notice strong {
            display: block;
            margin-bottom: 5px;
        }

        code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="setup-notice">
            <strong>⚠️ Setup Required</strong>
            Replace SUPABASE_URL and SUPABASE_ANON_KEY in the JavaScript below with your actual Supabase credentials.
        </div>

        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <div id="loginForm">
            <div class="oauth-buttons">
                <button class="oauth-btn" onclick="signInWithGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <button class="oauth-btn" onclick="signInWithGithub()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="#333">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                    </svg>
                    Continue with GitHub
                </button>

                <button class="oauth-btn" onclick="signInWithAzure()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#00A4EF" d="M0 0h11.377v11.372H0z"/>
                        <path fill="#FFB900" d="M12.623 0H24v11.372H12.623z"/>
                        <path fill="#F25022" d="M0 12.628h11.377V24H0z"/>
                        <path fill="#7FBA00" d="M12.623 12.628H24V24H12.623z"/>
                    </svg>
                    Continue with Microsoft
                </button>
            </div>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="email-login">
                <input type="email" id="emailInput" placeholder="Email address" />
                <button class="email-btn" onclick="signInWithEmail()">Continue with Email</button>
            </div>
        </div>

        <div class="user-info" id="userInfo">
            <h3>Logged In</h3>
            <p><strong>Email:</strong> <span id="userEmail"></span></p>
            <p><strong>Provider:</strong> <span id="userProvider"></span></p>
            <button class="logout-btn" onclick="signOut()">Sign Out</button>
        </div>
    </div>

    <script>
        // ============================================
        // SETUP: Replace these with your Supabase credentials
        // ============================================
        const SUPABASE_URL = 'https://toiwsjvxlmoxuyfprafb.supabase.co'; // e.g., 'https://xyzcompany.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvaXdzanZ4bG1veHV5ZnByYWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyODg4MzQsImV4cCI6MjA4NTg2NDgzNH0.7vtQAwcxUQdbmAxTscrEeAO7g_jxPyDCndEp5FUIrp0';

        // Initialize Supabase client
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if user is already logged in
        checkUser();

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            if (user) {
                showUserInfo(user);
            }
        }

        // Google OAuth
        async function signInWithGoogle() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                showError(error.message);
            }
        }

        // GitHub OAuth
        async function signInWithGithub() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'github',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                showError(error.message);
            }
        }

        // Azure/Microsoft OAuth
        async function signInWithAzure() {
            try {
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'azure',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname,
                        scopes: 'email'
                    }
                });
                
                if (error) throw error;
            } catch (error) {
                showError(error.message);
            }
        }

        // Email Magic Link
        async function signInWithEmail() {
            const email = document.getElementById('emailInput').value;
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }

            try {
                const { error } = await supabaseClient.auth.signInWithOtp({
                    email: email,
                    options: {
                        emailRedirectTo: window.location.origin + window.location.pathname
                    }
                });
                
                if (error) throw error;
                
                showSuccess('Check your email for the magic link!');
            } catch (error) {
                showError(error.message);
            }
        }

        // Sign out
        async function signOut() {
            try {
                const { error } = await supabaseClient.auth.signOut();
                if (error) throw error;
                
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
                showSuccess('Signed out successfully');
            } catch (error) {
                showError(error.message);
            }
        }

        // Display user info
        function showUserInfo(user) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userProvider').textContent = user.app_metadata.provider || 'email';
        }

        // Error handling
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // Success messages
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }

        // Listen for auth state changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                showUserInfo(session.user);
            } else if (event === 'SIGNED_OUT') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
        });
    </script>
</body>
</html>
